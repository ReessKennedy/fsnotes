name: Build FSNotes iOS (IPA for AltStore)

# Runs on every push to master, OR manually via the Actions tab on GitHub
on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15   # Pinned: macos-latest is now macos-26 (Xcode 26, GA Feb 2026).
                         # Xcode 26 ships with iOS 26 SDK which triggers Liquid Glass UIKit
                         # compile paths in CropViewController that still have SDK issues.
                         # macos-15 = Xcode 16.x, which is what this project requires.

    steps:
      # ── 0. Show Xcode / SDK versions for diagnostics ────────────────────────
      - name: Show Xcode and SDK versions
        run: |
          xcode-select -p
          xcodebuild -version
          xcrun --sdk iphoneos --show-sdk-version
          swift --version

      # ── 1. Check out your fork ──────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Cache CocoaPods to speed up subsequent runs ──────────────────────
      #   NOTE: No restore-keys fallback — a broad fallback restores stale Pods
      #   directories from previous cache keys, which defeats version pinning.
      - name: Cache CocoaPods
        uses: actions/cache@v4
        with:
          path: Pods
          key: ${{ runner.os }}-pods-${{ hashFiles('Podfile') }}

      # ── 3. Install CocoaPods dependencies ───────────────────────────────────
      - name: Install CocoaPods
        run: |
          gem install cocoapods --no-document
          pod install --repo-update

      # ── 3b. Patch CropViewController for Xcode 16 / iOS 18 SDK ─────────────
      #   TOCropViewController.m 3.1.1 uses UIViewLayoutRegion (iOS 26 type)
      #   that doesn't exist in iOS 18 SDK headers. @available() guards runtime
      #   execution but Clang still needs the *declarations* to parse the file.
      #   We wrap the block in a #if SDK-version check so Clang skips it.
      - name: Patch CropViewController (Xcode 16 SDK compatibility)
        run: |
          # CocoaPods marks :git source files read-only — unlock the whole dir first
          chmod -R u+w Pods/CropViewController/

          python3 - <<'PYEOF'
          import sys

          path = 'Pods/CropViewController/Objective-C/TOCropViewController/TOCropViewController.m'
          try:
              src = open(path).read()
          except FileNotFoundError:
              print(f'ERROR: {path} not found — did pod install succeed?', file=sys.stderr)
              sys.exit(1)

          SENTINEL = '#if __IPHONE_OS_VERSION_MAX_ALLOWED >= 260000'
          if SENTINEL in src:
              print('Already patched — skipping')
              sys.exit(0)

          BLOCK_START = (
              '    // fix: On iOS 26, overlay with iPadOS windowingControl area.\n'
              '    if (@available(iOS 26.0, *)) {\n'
              '      if (!verticalLayout) {\n'
              '        UIViewLayoutRegion *layoutRegion'
          )
          BLOCK_END = '        insets.bottom = edgeInsets.bottom;\n      }\n    }'

          if BLOCK_START not in src:
              print('WARNING: patch target not found — pod source may have changed')
              print('Check Pods/CropViewController/Objective-C/TOCropViewController/TOCropViewController.m')
              sys.exit(0)  # non-fatal so the build can still try

          # Split on BLOCK_START; replace BLOCK_END only in the text that follows it
          before, after = src.split(BLOCK_START, 1)
          after = after.replace(BLOCK_END, BLOCK_END + '\n#endif  /* __IPHONE_OS_VERSION_MAX_ALLOWED >= 260000 */', 1)
          src = before + SENTINEL + '\n' + BLOCK_START + after

          open(path, 'w').write(src)
          print('Patched TOCropViewController.m successfully ✓')
          PYEOF

      # ── 3c. Create modern.appiconset so actool thinning doesn't fail ─────────
      #   The project sets ASSETCATALOG_COMPILER_APPICON_NAME=modern but only
      #   has AppIconModern.imageset (wrong type). actool's thinned-variant
      #   pass requires a proper appiconset with explicit sizes.
      #   We use the old-style multi-size format (same PNG for all) since
      #   that is guaranteed compatible with every actool version.
      - name: Create modern.appiconset for actool
        run: |
          python3 - << 'PYEOF'
          import json, os, shutil

          icon_dir = "FSNotes iOS/Assets.xcassets/Icons"
          src_png  = f"{icon_dir}/AppIconModern.imageset/classic-iOS-Default-1024x1024@1x.png"
          dest     = f"{icon_dir}/modern.appiconset"
          png_name = "icon.png"

          os.makedirs(dest, exist_ok=True)
          shutil.copy(src_png, f"{dest}/{png_name}")

          # Multi-size format: actool needs explicit entries for every variant
          # it tries to thin. Using the same 1024×1024 source for all is fine
          # for a sideloaded IPA — icons are not App-Store validated here.
          sizes = [
              ("iphone", "2x", "20x20"),
              ("iphone", "3x", "20x20"),
              ("iphone", "2x", "29x29"),
              ("iphone", "3x", "29x29"),
              ("iphone", "2x", "40x40"),
              ("iphone", "3x", "40x40"),
              ("iphone", "2x", "60x60"),
              ("iphone", "3x", "60x60"),
              ("ipad",   "1x", "20x20"),
              ("ipad",   "2x", "20x20"),
              ("ipad",   "1x", "29x29"),
              ("ipad",   "2x", "29x29"),
              ("ipad",   "1x", "40x40"),
              ("ipad",   "2x", "40x40"),
              ("ipad",   "1x", "76x76"),
              ("ipad",   "2x", "76x76"),
              ("ipad",   "2x", "83.5x83.5"),
              ("ios-marketing", "1x", "1024x1024"),
          ]
          images = [{"filename": png_name, "idiom": idiom, "scale": scale, "size": size}
                    for idiom, scale, size in sizes]

          contents = {"images": images, "info": {"author": "xcode", "version": 1}}
          with open(f"{dest}/Contents.json", "w") as f:
              json.dump(contents, f, indent=2)

          print(f"Created {dest}/Contents.json with {len(images)} size entries ✓")
          PYEOF


      # ── 4. Archive the iOS app (no code signing — AltStore handles that) ─────
      #   SWIFT_VERSION=5 prevents Xcode 16 from enforcing Swift 6 strict
      #   concurrency rules, which breaks older Swift packages (Shout, cgit2…)
      #   ASSETCATALOG_COMPILER_GENERATE_SWIFT_ASSET_SYMBOL_EXTENSIONS=NO is
      #   now baked into project.pbxproj for the iOS target, but we keep the
      #   command-line flag as a belt-and-suspenders safety net.
      #   ASSETCATALOG_COMPILER_GENERATE_ASSET_SYMBOLS=NO suppresses the
      #   GeneratedAssetSymbols.swift file entirely — without this, actool
      #   generates it even when SWIFT_ASSET_SYMBOL_EXTENSIONS is NO, and
      #   the generated file causes Swift compilation failures (3 errors).
      - name: Archive FSNotes iOS
        run: |
          xcodebuild archive \
            -workspace FSNotes.xcworkspace \
            -scheme "FSNotes iOS" \
            -configuration Release \
            -destination "generic/platform=iOS" \
            -archivePath "$RUNNER_TEMP/FSNotes.xcarchive" \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            ONLY_ACTIVE_ARCH=NO \
            SWIFT_VERSION=5 \
            ASSETCATALOG_COMPILER_SKIP_APP_STORE_DEPLOYMENT=YES \
            ASSETCATALOG_COMPILER_GENERATE_SWIFT_ASSET_SYMBOL_EXTENSIONS=NO \
            ASSETCATALOG_COMPILER_GENERATE_ASSET_SYMBOLS=NO \
            2>&1 | tee "$RUNNER_TEMP/build.log"
          # Preserve xcodebuild exit code through the pipe
          exit ${PIPESTATUS[0]}

      # ── 4b. Surface actual errors if the build failed ───────────────────────
      - name: Show build errors (if any)
        if: failure()
        run: |
          echo "══════════ ERROR LINES WITH CONTEXT ══════════"
          # Show each error line plus up to 5 lines of surrounding context
          grep -n " error: \| warning: .*error" "$RUNNER_TEMP/build.log" | head -60 || echo "(no error: lines found)"
          echo ""
          echo "══════════ LAST 500 LINES OF BUILD LOG ══════════"
          tail -500 "$RUNNER_TEMP/build.log"

      # ── 4c. Show GeneratedAssetSymbols.swift if it exists ───────────────────
      - name: Show GeneratedAssetSymbols.swift (if any)
        if: failure()
        run: |
          GSFILE=$(find ~/Library/Developer/Xcode/DerivedData -name "GeneratedAssetSymbols.swift" 2>/dev/null | head -1)
          if [ -n "$GSFILE" ]; then
            echo "Found: $GSFILE"
            cat "$GSFILE"
          else
            echo "GeneratedAssetSymbols.swift not found in DerivedData"
          fi

      # ── 4d. Upload full build log on failure for diagnosis ──────────────────
      - name: Upload build log (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: ${{ runner.temp }}/build.log
          retention-days: 7


      # ── 5. Package the .app bundle into a .ipa ──────────────────────────────
      #   AltStore will re-sign this IPA with your Apple ID when you install it.
      - name: Package IPA
        run: |
          mkdir -p "$RUNNER_TEMP/ipa/Payload"
          cp -r "$RUNNER_TEMP/FSNotes.xcarchive/Products/Applications/FSNotes iOS.app" \
                "$RUNNER_TEMP/ipa/Payload/"
          cd "$RUNNER_TEMP/ipa"
          zip -r "FSNotes-iOS.ipa" Payload

      # ── 6. Upload the .ipa as a downloadable artifact ───────────────────────
      #   After the workflow finishes, go to Actions → your run → Artifacts
      #   and download "FSNotes-iOS". Then drag the .ipa into AltStore.
      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: FSNotes-iOS
          path: ${{ runner.temp }}/ipa/FSNotes-iOS.ipa
          retention-days: 14
